name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk zip unzip git autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev libltdl-dev
          pip3 install --upgrade Cython==0.29.33 virtualenv
      - name: Install Buildozer
        run: pip install buildozer
      - name: Ensure buildozer.spec exists and is configured
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/^title = .*/title = Burmaldochi/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = burmaldochi/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = com.example.burmaldochi/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.ndk = .*/android.ndk = 23b/' buildozer.spec
          sed -i 's/^#icon.filename = %(source.dir)s\/icon.png/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
      - name: Clean previous builds
        run: rm -rf .buildozer
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: burmaldochi-apk
          path: bin/*.apk
