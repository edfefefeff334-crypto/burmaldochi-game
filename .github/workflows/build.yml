name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk zip unzip git autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev libltdl-dev
          pip3 install --upgrade Cython==0.29.33 virtualenv
      - name: Install Buildozer
        run: pip install buildozer
      - name: Configure buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          sed -i 's/^title = .*/title = Burmaldochi/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = burmaldochi/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = com.example.burmaldochi/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.ndk = .*/android.ndk = 23b/' buildozer.spec
          sed -i 's/^android.sdk = .*/android.sdk = 31/' buildozer.spec
          sed -i 's/^#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 33.0.0/' buildozer.spec
          sed -i 's/^#icon.filename = %(source.dir)s\/icon.png/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
      - name: Clean previous builds
        run: rm -rf .buildozer ~/.cache/buildozer
      - name: Manually set up Android SDK tools (to satisfy Buildozer)
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          # Скачиваем commandlinetools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          # Перемещаем содержимое в tools/ (Buildozer ожидает sdkmanager в tools/bin/)
          mkdir -p $ANDROID_SDK_ROOT/tools
          mv cmdline-tools/* $ANDROID_SDK_ROOT/tools/
          # Теперь sdkmanager должен быть по пути tools/bin/sdkmanager
          # Принимаем лицензии
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses > /dev/null 2>&1
          # Устанавливаем нужные компоненты
          $ANDROID_SDK_ROOT/tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;33.0.0" "platforms;android-31" "platform-tools"
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: burmaldochi-apk
          path: bin/*.apk
